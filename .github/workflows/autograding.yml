name: Autograding

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build
        run: mvn -q -DskipTests package

      - name: Start Server and Run Tests
        run: |
          mvn -q jetty:run >/dev/null 2>&1 &
          echo "Waiting for server to start..."
          for i in {1..60}; do
            if curl -sSf http://localhost:8080/ >/dev/null; then
              echo "Server is up!"
              break
            fi
            echo "Still waiting... ($i/60)"
            sleep 1
          done
          
          if ! curl -sSf http://localhost:8080/ >/dev/null; then
            echo "::error::Server failed to start after 60 seconds."
            exit 1
          fi
          
          echo "Running tests..."
          chmod +x src/test/*.sh
          bash src/test/run_all_tests.sh
